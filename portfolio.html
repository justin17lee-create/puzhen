<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio — Puzhen 樸真</title>
  <link rel="stylesheet" href="style.css">
</head>
<script src="nav.js"></script>
<body>

  <section class="portfolio fade-content" id="pageContent">

    <h2>Animation</h2>

    <div class="film-block">
      <p class="film-title">Deep End (2026)</p>
      <p class="film-desc">
        A shy girl overcomes her fear of swimming - and of connection - when she forms a magical summer bond with a bold classmate in the deep end of the pool.
      </p>
    </div>

    <div class="video-wrap">
      <iframe
        src="https://www.youtube.com/embed/1JIyGr_uoHA"
        title="Deep End - Film Trailer"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>

    <div class="grid-2">
      <img src="images/animation1.png" alt="">
      <img src="images/animation2.png" alt="">
      <img src="images/animation3.png" alt="">
      <img src="images/animation4.png" alt="">
      <img src="images/animation5.png" alt="">
      <img src="images/animation6.png" alt="">
    </div>

    <h2>Model Making</h2>

    <div class="model-grid">
      <img src="images/model1.jpg" alt="">
      <img src="images/model2.jpg" alt="">
      <img src="images/model3.jpg" alt="">
      <img src="images/model4.jpg" alt="">
      <img src="images/model5.jpg" alt="">
      <img src="images/model6.jpg" alt="">
      <img src="images/model7.jpg" alt="">
      <img src="images/model8.jpg" alt="">
      <img src="images/model9.jpg" alt="">
      <img src="images/model10.jpg" alt="">
      <img src="images/model11.jpg" alt="">
      <img src="images/model12.jpg" alt="">
    </div>

  </section>

  <!-- 页面淡入 -->
  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        document.getElementById('pageContent').classList.add('visible');
      }, 100);
    });
  </script>

  <!-- ✅ Lightbox（已整合完成） -->
  <div class="lightbox" id="lightbox">
    <img id="lightbox-img" alt="">
  </div>

  <script>
    const images = document.querySelectorAll('.model-grid img, .grid-2 img');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    images.forEach(img => {
      img.addEventListener('click', () => {
        lightbox.style.display = 'flex';
        lightboxImg.src = img.src;
      });
    });

    lightbox.addEventListener('click', () => {
      lightbox.style.display = 'none';
    });
  </script>

</body>
</html>
