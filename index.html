<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puzhen 樸真</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- NAV -->
  <nav class="nav">
    <a href="#home">Home</a>
    <a href="#portfolio">Portfolio</a>
    <a href="#contact">Contact</a>
  </nav>

  <!-- HOME -->
  <section class="hero" id="home">
    <div class="hero-content" id="heroContent">
      <h1>Puzhen <span class="cn">樸真</span></h1>
      <p class="hero-sub">DIRECTOR &nbsp;&nbsp; ANIMATOR &nbsp;&nbsp; MODEL MAKER</p>
    </div>
  </section>

  <!-- PORTFOLIO -->
  <section class="portfolio" id="portfolio">
    <h2>Animation</h2>
    <p class="film-title">Deep End</p>
    <div class="video-wrap">
      <iframe
        src="https://www.youtube.com/embed/1JIyGr_uoHA"
        title="Deep End - Film Trailer"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
    <div class="grid grid-2">
      <img src="images/animation1.png" alt="">
      <img src="images/animation2.png" alt="">
      <img src="images/animation3.png" alt="">
      <img src="images/animation4.png" alt="">
      <img src="images/animation5.png" alt="">
      <img src="images/animation6.png" alt="">
    </div>

    <h2>Model Making</h2>
    <div class="masonry">
      <img src="images/model1.jpg" alt="">
      <img src="images/model2.jpg" alt="">
      <img src="images/model3.jpg" alt="">
      <img src="images/model4.jpg" alt="">
      <img src="images/model5.jpg" alt="">
      <img src="images/model6.jpg" alt="">
      <img src="images/model7.jpg" alt="">
      <img src="images/model8.jpg" alt="">
    </div>
  </section>

  <!-- CONTACT -->
  <section class="contact" id="contact">
    <div class="overlay">
      <div class="contact-item">
        <p class="contact-label">INSTAGRAM</p>
        <p class="contact-value"><a href="https://www.instagram.com/puzhen.creations/" target="_blank">@puzhen.creations</a></p>
      </div>
      <div class="contact-item">
        <p class="contact-label">EMAIL</p>
        <p class="contact-value"><a href="mailto:puzhen.art@gmail.com">puzhen.art@gmail.com</a></p>
      </div>
      <div class="contact-item">
        <p class="contact-label">PHONE</p>
        <p class="contact-value">+44 7398 869093</p>
      </div>
    </div>
  </section>

  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        document.getElementById('heroContent').classList.add('visible');
      }, 100); /* 300ms 改成 100ms，几乎立即触发 */
    });
  </script>
</body>
</html>
